services:
  # Backend API
  - type: web
    name: crm-voice-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crm-voice-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false          # Lo ingresas manualmente en el dashboard
      - key: FRONTEND_URL
        sync: false          # URL de tu frontend en Vercel

  # PostgreSQL
databases:
  - name: crm-voice-db
    databaseName: crmvoice
    plan: free
